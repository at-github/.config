set -g default-terminal "screen-256color"
set -g default-shell /bin/zsh

#gray 235
#136 yellow
#136 orange
#244 base0 ?
#240 base01 ?
#235 base02

# change prefix
unbind C-b
set -g prefix C-a
bind a send-prefix

# shorten command delay
set -sg escape-time 1

# reload ~/.tmux.conf using PREFIX r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Center the window list
set -g status-justify centre

# start windows numbering at 1
set -g base-index 1

# disable time between switch panes
set-option -g repeat-time 0

# make pane numbering consistent with windows
setw -g pane-base-index 1

# Notifying if other windows has activities
setw -g monitor-activity on
set -g visual-activity on

# Mouse
set -g mouse on
# Mouse on
bind m set -g mouse \;\
  display 'Mouse: toggle'

# window pane background
setw -g window-style bg=default
setw -g window-active-style bg=default

# pane border
set-option -g pane-border-style fg=color235
set-option -g pane-active-border-style fg=color240

setw -g pane-border-status off

# message text
set -g message-style bg=color0,fg=color6

# pane number display
set-option -g display-panes-active-colour color4
set-option -g display-panes-colour color5

# clock
set-window-option -g clock-mode-colour color2

# show host name and IP address on left side of status bar
set -g status-left-length 70
set -g status-left "  #(whoami) 󰜪 #H  #{b:pane_current_path}/"

# default window title colors
set-window-option -g window-status-style fg=color7

# active window title colors
set-window-option -g window-status-current-style fg=color235,bg=color136

# show session name, window & pane number, date, time and battery on right side of
# status bar
set -g status-right-length 60
set -g status-right " #S 󰥔 %l:%M"

set -g window-status-format " #I #W "
set -g window-status-current-format " #W "
# set -ag window-status-current-format " #W (#I) "
set -g window-status-separator ""

# Utile ?
run-shell '~/.config/tmux/colors.sh'

#Use vi key bindings in copy mode
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

# Tmux plugins

## Plugin manager needed https://github.com/tmux-plugins/tpm?tab=readme-ov-file#installation
# `git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm`

## List of plugins
### Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
set -g @plugin 'omerxx/tmux-floax'

# Setting the main key to toggle the floating pane on and off
set -g @floax-bind 'f'

# The default width and height of the floating pane
set -g @floax-width '50%'
set -g @floax-height '25%'

run '~/.tmux/plugins/tpm/tpm'

# move into panes with <C-↑→↓←>
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-Left' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-Down' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-Up' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-Right' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

unbind -n C-l

# same in copy-mode-vi
bind-key -T copy-mode-vi 'C-Left' select-pane -L
bind-key -T copy-mode-vi 'C-Down' select-pane -D
bind-key -T copy-mode-vi 'C-Up' select-pane -U
bind-key -T copy-mode-vi 'C-Right' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
